<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Downloader</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}
.container {
    background: #fff;
    color: #000;
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}
h1 { text-align:center; margin-bottom:25px; color:#2a5298; }
.message { margin-top: 20px; font-weight:bold; }
.progress { margin-top: 15px; }
</style>
</head>
<body>
<div class="container">
    <h1>YouTube Downloader</h1>
    <form method="post">
        <div class="mb-3">
            <input type="text" name="url" class="form-control" placeholder="Enter YouTube URL" required>
        </div>
        <div class="mb-3">
            <input type="number" name="quality" class="form-control" placeholder="Quality (e.g., 360, 720)">
        </div>
        <div class="mb-3">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="mode" value="video" checked>
                <label class="form-check-label">Video + Audio</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="mode" value="audio">
                <label class="form-check-label">Audio Only (MP3)</label>
            </div>
        </div>
        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-lg">Download</button>
        </div>
    </form>

    {% if progress %}
    <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
             style="width: {{ progress or '0%' }};"
             aria-valuenow="{{ (progress|replace('%', '')) if progress else 0 }}"
             aria-valuemin="0" aria-valuemax="100">
            {{ progress or '0%' }}
        </div>
    </div>
    {% endif %}

    {% if message %}
        <div class="alert alert-info text-center message">{{ message }}</div>
    {% endif %}

    {% if download_link %}
        <a href="{{ url_for('serve_file', filename=download_link) }}" class="btn btn-success d-block mt-3" download>Click here to download file</a>
    {% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
