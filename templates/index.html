<!DOCTYPE html>
<html>
<head>
    <title>YouTube Downloader</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
        }
        input, select, button {
            margin: 10px;
            padding: 8px;
            width: 90%;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>YouTube Downloader</h2>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL" required>

        <input type="text" name="quality" placeholder="Quality (e.g., 720)">

        <select name="type">
            <option value="video">Video + Audio</option>
            <option value="audio">Audio (MP3)</option>
        </select>

        <button type="submit">Download</button>
    </form>

    <p>{{ message }}</p>
</div>

</body>
</html>
