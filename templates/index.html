<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; text-align:center; margin-top:50px; background-color:#f0f0f0; }
        form { background:#fff; padding:20px; border-radius:10px; display:inline-block; }
        input[type="text"], input[type="number"] { padding:10px; width:250px; margin:5px; }
        input[type="submit"] { padding:10px 20px; background:#007bff; color:#fff; border:none; border-radius:5px; cursor:pointer; }
        input[type="submit"]:hover { background:#0056b3; }
        .message { margin-top:20px; font-weight:bold; color:green; }
    </style>
</head>
<body>
    <h1>YouTube Downloader</h1>
    <form method="post">
        <input type="text" name="url" placeholder="Enter YouTube URL" required><br>
        <input type="number" name="quality" placeholder="Quality (e.g., 360, 720)"><br>
        <label><input type="radio" name="mode" value="video" checked> Video + Audio</label>
        <label><input type="radio" name="mode" value="audio"> Audio Only (MP3)</label><br><br>
        <input type="submit" value="Download">
    </form>
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}
</body>
</html>
